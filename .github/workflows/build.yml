name: Build APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Prepare www folder
        run: |
          mkdir -p www
          cp index.html www/
          cp manifest.json www/
          cp icon-192.png www/
          cp icon-512.png www/

      - name: Install dependencies
        run: |
          npm init -y
          npm install @capacitor/cli@5.7.4 @capacitor/core@5.7.4 @capacitor/android@5.7.4

      - name: Init Capacitor
        run: |
          npx cap init "quiz" "com.scar4r.centralquiz" --web-dir www

      - name: Add Android
        run: npx cap add android

      - name: Sync
        run: npx cap sync android

      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
